<head>

    <meta name="description"

    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FleetAdmin Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index.css?v=34">
    <link rel="stylesheet" href="css/components.css?v=34">
    <link rel="stylesheet" href="css/modules.css?v=34">
</head>

<body>
    <div id="app">
        <!-- Pantalla de carga inicial -->
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <div class="splash-icon">🚗</div>
                <h1 class="splash-title">FleetAdmin Pro</h1>
                <div class="splash-loader">
                    <div class="splash-loader-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <!-- Scripts del sistema -->
    <script src="js/i18n.js?v=34"></script>
    <script src="js/firebase-config.js?v=34"></script>
    <script src="js/db.js?v=34"></script>
    <script src="js/units.js?v=34"></script>
    <script src="js/auth.js?v=34"></script>
    <script src="js/alerts.js?v=34"></script>
    <script src="js/components.js?v=34"></script>
    <script src="js/router.js?v=34"></script>
    <script src="js/modules/login.js?v=34"></script>
    <script src="js/modules/dashboard.js?v=34"></script>
    <script src="js/modules/shifts.js?v=34"></script>
    <script src="js/modules/maintenance.js?v=34"></script>
    <script src="js/modules/vehicles.js?v=34"></script>
    <script src="js/modules/settings.js?v=34"></script>

    <script src="js/storage.js?v=34"></script>
    <script src="js/modules/gps.js?v=34"></script>
    <script src="js/notifications.js?v=34"></script>
    <script src="js/app.js?v=34"></script>

    <script>
        // Registro del Service Worker para PWA con Auto-Recarga
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('Service Worker registrado:', reg.scope);
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // Forzar recarga si hay nueva versión PWA
                                window.location.reload(true);
                            }
                        });
                    });
                })
                .catch(err => console.error('Error registrando SW:', err));
        }
    </script>
</body>

</html>
