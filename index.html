    <script src="js/app.js?v=65"></script>

    <script>
        // Registro del Service Worker para PWA con Banner de Actualización
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('Service Worker registrado:', reg.scope);

                    // Detectar cuando hay una actualización disponible
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            // Solo mostrar banner si hay un SW previo controlando la página
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('🔄 SW: Nueva versión instalada. Mostrando banner...');
                                _showUpdateBanner();
                            }
                        });
                    });

                    // También chequear si hay un SW en espera al cargar
                    if (reg.waiting && navigator.serviceWorker.controller) {
                        _showUpdateBanner();
                    }
                })
                .catch(err => console.error('Error registrando SW:', err));

            // Cuando el nuevo SW tome control, recargar automáticamente
            let _refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (_refreshing) return;
                _refreshing = true;
                window.location.reload();
            });
        }

        function _showUpdateBanner() {
            // Evitar duplicados
            if (document.getElementById('sw-update-banner')) return;

            const banner = document.createElement('div');
            banner.id = 'sw-update-banner';
            banner.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; z-index: 999999;
                background: linear-gradient(135deg, #4338ca, #6366f1);
                color: white; display: flex; align-items: center;
                justify-content: center; gap: 12px; padding: 12px 20px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                font-size: 14px; font-weight: 600;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                animation: slideDown 0.4s ease;
            `;
            banner.innerHTML = `
                <span>🔄 ¡Nueva versión disponible!</span>
                <button onclick="_applyUpdate()" style="
                    background: white; color: #4338ca; border: none;
                    padding: 6px 18px; border-radius: 20px; font-weight: 700;
                    font-size: 13px; cursor: pointer; white-space: nowrap;
                ">Actualizar</button>
            `;

            // Agregar animación CSS si no existe
            if (!document.getElementById('sw-update-style')) {
                const style = document.createElement('style');
                style.id = 'sw-update-style';
                style.textContent = '@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }';
                document.head.appendChild(style);
            }

            document.body.appendChild(banner);
        }

        function _applyUpdate() {
            const reg = navigator.serviceWorker?.controller?.scriptURL
                ? navigator.serviceWorker.getRegistration()
                : Promise.resolve(null);

            reg.then(r => {
                if (r && r.waiting) {
                    r.waiting.postMessage({ type: 'SKIP_WAITING' });
                } else {
                    // Fallback: forzar recarga directa
                    window.location.reload(true);
                }
            }).catch(() => {
                window.location.reload(true);
            });
        }
    </script>
</body>

</html>
