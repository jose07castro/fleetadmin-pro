    <script>
        // FORCE CACHE PURGE v91 — Ejecutar ANTES de que el SW intercepte
        (function() {
            var REQUIRED_VERSION = 91;
            var lastPurge = parseInt(localStorage.getItem('fa_cache_ver') || '0');
            if (lastPurge < REQUIRED_VERSION && 'serviceWorker' in navigator) {
                console.log('🔥 PURGE: Forzando limpieza de Service Worker y caché...');
                localStorage.setItem('fa_cache_ver', String(REQUIRED_VERSION));
                caches.keys().then(function(names) {
                    return Promise.all(names.map(function(name) {
                        console.log('🗑️ Borrando caché:', name);
                        return caches.delete(name);
                    }));
                }).then(function() {
                    return navigator.serviceWorker.getRegistrations();
                }).then(function(registrations) {
                    return Promise.all(registrations.map(function(reg) {
                        console.log('🗑️ Desregistrando SW:', reg.scope);
                        return reg.unregister();
                    }));
                }).then(function() {
                    console.log('✅ PURGE completado. Recargando...');
                    window.location.reload(true);
                }).catch(function(e) {
                    console.error('PURGE error:', e);
                    window.location.reload(true);
                });
            }
        })();
    </script>

    <script>
        // =============================================
        // Service Worker Registration + Update Modal
        // =============================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('Service Worker registrado:', reg.scope);

                    // Detectar nueva versión
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('🔄 SW: Nueva versión instalada. Mostrando modal...');
                                _showUpdateModal();
                            }
                        });
                    });

                    // SW en espera al cargar
                    if (reg.waiting && navigator.serviceWorker.controller) {
                        _showUpdateModal();
                    }

                    // Forzar chequeo cada 60 segundos
                    setInterval(() => reg.update(), 60000);
                })
                .catch(err => console.error('Error registrando SW:', err));

            // Cuando el nuevo SW tome control, recargar
            let _refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (_refreshing) return;
                _refreshing = true;
                window.location.reload();
            });
        }

        function _showUpdateModal() {
            if (document.getElementById('sw-update-overlay')) return;

            // Estilos del modal
            if (!document.getElementById('sw-update-styles')) {
                const style = document.createElement('style');
                style.id = 'sw-update-styles';
                style.textContent = `
                    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
                    @keyframes scaleInModal { from { opacity: 0; transform: scale(0.85) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
                    @keyframes pulseBtn { 0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.5); } 50% { box-shadow: 0 0 0 12px rgba(99,102,241,0); } }
                    #sw-update-overlay { position:fixed; inset:0; z-index:999999; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; animation:fadeInOverlay .3s ease; }
                    #sw-update-card { background:linear-gradient(145deg,#1e1b4b,#312e81); border:1px solid rgba(129,140,248,0.3); border-radius:20px; padding:32px 28px; max-width:380px; width:90%; text-align:center; animation:scaleInModal .4s ease; box-shadow:0 25px 60px rgba(0,0,0,0.5); }
                    #sw-update-card .update-icon { font-size:52px; margin-bottom:12px; }
                    #sw-update-card h2 { color:#e0e7ff; font-family:'Inter',sans-serif; font-size:20px; font-weight:700; margin:0 0 8px; }
                    #sw-update-card p { color:#a5b4fc; font-family:'Inter',sans-serif; font-size:14px; margin:0 0 24px; line-height:1.5; }
                    #sw-update-card .countdown { color:#818cf8; font-size:12px; margin-top:12px; font-family:'Inter',sans-serif; }
                    .sw-btn-update { background:linear-gradient(135deg,#6366f1,#818cf8); color:white; border:none; padding:14px 36px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; animation:pulseBtn 2s infinite; width:100%; }
                    .sw-btn-update:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(99,102,241,0.4); }
                `;
                document.head.appendChild(style);
            }

            const overlay = document.createElement('div');
            overlay.id = 'sw-update-overlay';
            overlay.innerHTML = `
                <div id="sw-update-card">
                    <div class="update-icon">🚀</div>
                    <h2>¡Nueva Versión Disponible!</h2>
                    <p>Hay una actualización con mejoras y correcciones.<br>Presioná el botón para aplicar los cambios.</p>
                    <button class="sw-btn-update" onclick="_applyUpdate()">Actualizar Ahora</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function _applyUpdate() {
            // Limpiar cachés y forzar recarga
            if ('caches' in window) {
                caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))));
            }
            navigator.serviceWorker.getRegistration().then(r => {
                if (r && r.waiting) {
                    r.waiting.postMessage({ type: 'SKIP_WAITING' });
                } else {
                    window.location.reload(true);
                }
            }).catch(() => {
                window.location.reload(true);
            });
        }
    </script>
